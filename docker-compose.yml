services:
  app:
    build: .
    container_name: base-server
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_DIR=/app/logs
      - TZ=Asia/Shanghai
    volumes:
      - app-logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-net

  mysql:
    image: mysql:8.0
    container_name: base-server-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
      - TZ=Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "${DB_EXPOSE_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-net

volumes:
  app-logs:
  mysql-data:

networks:
  app-net:
    driver: bridge
